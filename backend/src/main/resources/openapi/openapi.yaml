openapi: 3.0.3
info:
  title: MTB REST API
  version: 1.0.0
  description: REST API of the MTB service.
tags:
  - name: patient
    description: "Endpoints providing information about patients."
servers:
  - url: /api

paths:
  /healthinsurance:
    post:
      summary: insert database
      description: Add new Health Insurance to database.
      operationId: insertDatabase
      tags:
        - healthinsurance
      requestBody:
        description: Import database
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/HealthInsurance'
        required: true
      responses:
        200:
          description: OK
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        405:
          description: Invalid Input
        409:
          description: Unique constraint violated
    get:
      summary: Get all Health Insurance entries
      operationId: getHealthInsurance
      tags:
        - healthinsurance
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HealthInsurance'
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
  /healthinsurance/{id}:
    get:
      summary: Get Health Insurance by ID.
      operationId: getHealthInsuranceByID
      tags:
        - healthinsurance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: long
          description: The id of the HealthInsurance
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthInsurance'
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Health Insurence not found
  /workflows:
    post:
      summary: Add Workflow Schema
      operationId: addWorkflow
      tags:
        - workflow
      requestBody:
        description: The Workflow data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workflow'
      responses:
        200:
          description: OK
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        405:
          description: Invalid Input
        409:
          description: Unique constraint violated
        500:
          description: Workflow could not be added to database
    get:
      summary: List all available workflows.
      operationId: getWorkflows
      tags:
        - workflow
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workflow'
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
  /patients:
    post:
      summary: Add new patient to database.
      description: Add new patient to database.
      operationId: addPatient
      tags:
        - patient
      requestBody:
        description: Create a new patient in database.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Patient'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        400:
          description: Bad Request - some errors in the sent data
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        409:
          description: Unique constraint violated
    get:
      summary: List all available patients with the latest Episode.
      operationId: getPatients
      tags:
        - patient
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
  /patients/{id}:
    get:
      summary: Get one Patient with the latest Episode.
      operationId: getPatient
      tags:
        - patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the Patient
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Patient not found
    put:
      summary: Update one patient.
      operationId: updatePatient
      tags:
        - patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the patient
      requestBody:
        description: The updated patient
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Patient'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        400:
          description: Bad Request - some errors in the sent data
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Patient not found
        409:
          description: Unique constraint violated
  /episodes:
    #    get:
    #      summary: List all available episodes.
    #      operationId: getEpisodes
    #      tags:
    #        - episode
    #      responses:
    #        200:
    #          description: OK
    #          content:
    #            application/json:
    #              schema:
    #                type: array
    #                items:
    #                  $ref: '#/components/schemas/Episode'
    #        401:
    #          description: Unauthorized - The provided credentials are unknown
    #    delete:
    #      summary: delete all available episodes.
    #      operationId: deleteEpisodes
    #      tags:
    #        - episode
    #      responses:
    #        200:
    #          description: OK
    #        401:
    #          description: Unauthorized - The provided credentials are unknown
    post:
      summary: Add new episode to database.
      description: Add new episode to database.
      operationId: addEpisode
      tags:
        - episode
      requestBody:
        description: Create a new episode in database.
        content:
          application/json:
            schema:
              type: object
              properties:
                patientId:
                  type: string
                  format: uuid
                workflowId:
                  type: integer
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Episode'
        400:
          description: Foreign key constraint violated (Patient or Workflow not found)
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        405:
          description: Invalid Input
  /episodes/{id}:
    get:
      summary: Get one Episode.
      operationId: getEpisode
      tags:
        - episode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Episode'
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Episode not found
    put:
      summary: Update one Episode without updating stepInfo.
      operationId: updateEpisode
      tags:
        - episode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
      requestBody:
        description: The updated episode
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Episode'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Episode'
        400:
          description: Foreign key constraint violated (Patient or Workflow is not the same as in the saved episode)
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Episode not found
  /episodes/{id}/stepsinfo:
    get:
      summary: List all available stepInfo for an episode.
      operationId: getStepsInfo
      tags:
        - stepsinfo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StepInfo'
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Episode not found
    put:
      summary: Change Steps Info for an episode.
      description: Change Steps Info for an episode.
      operationId: updateStepsInfo
      tags:
        - stepsinfo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
      requestBody:
        description: Change Steps Info for an episode.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/StepInfo'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StepInfo'
        400:
          description: Foreign key constraint violated (Patient or Workflow not found)
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        405:
          description: Invalid Input
  /episodes/{episodeId}/presentations:
    post:
      summary: add presentation for an episode.
      description: add presentations for an episode.
      operationId: addPresentation
      tags:
        - presentation
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
      requestBody:
        description: add presentation date for an episode.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Presentation'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Presentation'
        400:
          description: Foreign key constraint violated (Episode not found)
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        405:
          description: Invalid Input (The given episode Id in the body is not the same as in the path)
        409:
          description: Presentation for the given Episode with the given date already exists
    get:
      summary: List all available presentations for an episode.
      operationId: getAllPresentations
      tags:
        - presentation
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Presentation'
        400:
          description: Foreign key constraint violated (Episode is not the same as the saved in the database)
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: presentation not found

  /episodes/{episodeId}/presentations/{presentationId}:
    get:
      summary: get presentation information for a specific presentationId.
      operationId: getPresentation
      tags:
        - presentation
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
        - name: presentationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the presentation
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Presentation'
        400:
          description: Foreign key constraint violated (Episode not found or is not the same as the saved in the database)
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Presentation not found
        409:
          description: Presentation for the given Episode with the given date already exists

    put:
      summary: Change presentation for an episode.
      description: Change presentations for an episode.
      operationId: updatePresentation
      tags:
        - presentation
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
        - name: presentationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the presentation
      requestBody:
        description: Change presentation for an episode.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Presentation'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Presentation'
        400:
          description: Foreign key constraint violated (Episode not found)
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Presentation not found
        405:
          description: Invalid Input
    delete:
      summary: Delete Presentation for an episode.
      description: Delete Presentation for an episode.
      operationId: deletePresentation
      tags:
        - presentation
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
        - name: presentationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the presentation
      responses:
        200:
          description: OK
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Presentation not found



  /episodes/{episodeId}/diagnoses:

