  /episodes/{episodeId}/kcReports:
    post:
      summary: Receive and save KC-Reports on the file system
      operationId: uploadKcReport
      tags:
        - kcReport
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the episode
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                # 'file' will be the field name in this multipart request
                file:
                  type: string
                  format: binary
                  description: The KC-Report file
