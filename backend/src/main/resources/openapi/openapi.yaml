          description: Foreign key constraint violated (Episode not found or is not the same as the saved in the database)
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Diagnose not found

    put:
      summary: Change diagnose for an episode.
      description: Change diagnose for an episode.
      operationId: updateDiagnose
      tags:
        - diagnose
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
        - name: diagnoseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the Diagnose
      requestBody:
        description: Change Diagnose for an episode.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Diagnose'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Diagnose'
        400:
          description: Bad Request - Foreign key constraint violated (Provided Episode does not match the one associated with the Diagnose) or invalid germline diagnose
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Diagnose not found

    delete:
      summary: Delete diagnose for an episode.
      description: Delete diagnose for an episode.
      operationId: deleteDiagnose
      tags:
        - diagnose
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
        - name: diagnoseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the Diagnose
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Diagnose not found
        409:
          description: Conflict - referenced somewhere else

