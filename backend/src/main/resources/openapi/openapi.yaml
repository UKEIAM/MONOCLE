        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Diagnose'
        400:
          description: Foreign key constraint violated (Episode is not the same as the saved in the database)
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden


  /episodes/{episodeId}/diagnoses/{diagnoseId}:

    get:
      summary: get Diagnose information for a specific presentationId.
      operationId: getDiagnose
      tags:
        - diagnose
      parameters:
        - name: episodeId
          in: path
