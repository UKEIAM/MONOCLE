      title: DataOfAddPatientTokenMl
      description: Data object that should be sent with the Token of addPatient
      type: object
      properties:
        idTypes:
          type: array
          items:
            type: string
        fields:
          type: object
        ids:
          type: object
          additionalProperties:
            type: string
        callback:
          type: string
        redirect:
          type: string
    DataOfReadPatientTokenMl:
      title: DataOfReadPatientTokenMl
      description: Data object that should be sent with the Token of readPatient
      type: object
      properties:
        searchIds:
          title: "Provide the ids of the patients you want to search for"
          type: array
          items:
            $ref: "#/components/schemas/PatientIdMl"
        resultFields:
          title: "Provide the fields of the patients you want to search for"
          type: array
          items:
            type: string
        resultIds:
          title: "Provide the ids you want to get as a result"
          type: array
          items:
            type: string
        resultAllPatientIds:
          title: "If true, list all existing ids of the patients"
          type: boolean
