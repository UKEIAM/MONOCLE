      title: PatientTokenMl
      description: Token object intended for Mainzelliste to request token generation.
      type: object
      required:
        - type
        - data
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/PatientCRUDEnums"
        allowedUses:
          type: string
        uri:
          type: string
        data:
          oneOf:
            - $ref: "#/components/schemas/DataOfAddPatientTokenMl"
            - $ref: "#/components/schemas/DataOfReadPatientTokenMl"
            - $ref: "#/components/schemas/DataOfEditPatientTokenMl"
