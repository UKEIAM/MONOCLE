      type: object
      required:
        - idType
        - idString
      properties:
        idType:
          type: string
        idString:
          type: string
        tentative:
          type: boolean
    PatientMl:
      type: object
      title: PatientMl
      description: Mainzelliste's patient object that includes patient fields and IDs.
      required:
        - "fields"
        - "ids"
      properties:
        fields:
          description: IDAT fields as key-value pairs (field names as keys).
          type: object
          additionalProperties:
            type: string
        ids:
          description: Array of patient IDs.
          type: array
          items:
            $ref: "#/components/schemas/PatientIdMl"
