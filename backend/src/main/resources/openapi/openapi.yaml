      title: DataOfEditPatientTokenMl
      description: Data object that should be sent with the Token of editPatient
      type: object
      properties:
        patientId:
          $ref: "#/components/schemas/PatientIdMl"
        fields:
          type: array
          items:
            type: string
        ids:
          type: array
          items:
            type: string
