      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/PatientCRUDEnums"
        allowedUses:
          type: string
        remainingUses:
          type: string
        data:
          type: object
        uri:
          type: string
