          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Diagnose'
        400:
          description: Bad Request - Foreign key constraint violated (EpisodeId or one of histologyResultId not found) or invalid germline diagnose
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Episode not found

    get:
      summary: List all available diagnoses for an episode.
      operationId: getAllDiagnoses
