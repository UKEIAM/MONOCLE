          description: Conflict (KC-Report with the same name already exists)
        415:
          description: Unsupported Media Type (Only Pdf files allowed)
    get:
      summary: Get all relevante information about KC-Reports.
      operationId: getKcReportsForEpisode
      tags:
        - kcReport
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KcReport'
        401:
          description: Unauthorized - The provided credentials are unknown
        403:
          description: Forbidden
        404:
          description: Episode not found
  /episodes/{episodeId}/kcReports/{kcReportId}:
    get:
      summary: get KC-Report with reportId from the file system
      operationId: getKcReportFile
      tags:
        - kcReport
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The id of the episode
        - name: kcReportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the KC-Report
      responses:
        200:
          description: OK
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        401:
          description: Unauthorized - The provided credentials are unknown
        404:
          description: Episode or KcReport not found
        500:
          description: Internal Server Error
    delete:
      summary: delete KC-Report with reportId from the file system
      operationId: deleteKcReport
      tags:
        - kcReport
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            description: The id of the episode
        - name: kcReportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the KC-Report
      responses:
        200:
          description: OK
        401:
          description: Unauthorized - The provided credentials are unknown
        404:
          description: Episode or KcReport not found
components:
  schemas:
    LabNumber:
      type: object
      properties:
        id:
          type: string
        specimenLabelling:
          type: string
        episodeId:
          type: string
          format: uuid
        assigned:
          type: boolean
        assignedOn:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
        createdAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
    AddressbookEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        email:
          type: string
        telephone:
          type: string
        fax:
          type: string
        weburl:
          type: string
        street:
          type: string
        streetnumber:
          type: string
        plz:
          type: string
        location:
          type: string
        ukeinternal:
          type: boolean
        addressbookEntryType:
          type: string
          enum: [ PATHOLOGIE, ZUWEISER, SONSTIGES ]
        createdAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
        updatedAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
        deletedAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
    AuditTrailEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dateOfEntry:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
        userId:
          type: string
        entry:
          type: string
    Patient:
      type: object
      properties:
        id:
          type: string
          format: uuid
        soarianId:
          type: string
        workflowId:
          type: string
          format: integer
        createdAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
        updatedAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
        deletedAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
        firstName:
          type: string
        surname:
          type: string
        gender:
          $ref: "#/components/schemas/GenderType"
        dateOfBirth:
          type: string
          format: date
          example: '2020-05-25'
        dateOfDeath:
          type: string
          format: date
          example: '2020-05-25'
        municipalityKey:
          type: string
          example: "12345"
        consent:
          type: boolean
        healthInsurance:
          type: string
          format: long
        episodes:
          type: array
          items:
            $ref: '#/components/schemas/Episode'
      required:
        - soarianId
        - consent
    #    PatientWithLastEpisode:
    #      allOf:
    #        - $ref: '#/components/schemas/Patient'
    #        - properties:
    #            lastEpisode:
    #              $ref: '#/components/schemas/Episode'
    Presentation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dateOfPresentation:
          type: string
          format: date
          example: '2020-05-27'
        episodeId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
        updatedAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
        deletedAt:
          type: string
          format: date-time
          example: '2020-05-27T17:32:28Z'
      required:
        - dateOfPresentation
        - episodeId
    Requirement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        recommended:
          type: boolean
        internDiagnostic:
          type: boolean
        moleculareDiagnostic:
          type: boolean
        ngs:
          type: boolean
        ngsType:
          type: string
          enum: [ NGS 500 Panel, RNA Panel, Exom, Transkriptom ]
        standard:
          type: boolean
        standardType:
          type: string
          enum: [ Sanger, RT-PCR, q-PCR ]
        others:
          type: boolean
        othersType:
          type: string
          enum: [ Multiplex IHC, Methylierungsanalytik ]
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
          example: '2017-07-21T17:32:28Z'
        updatedAt:
          type: string
          format: date-time
          example: '2017-07-21T17:32:28Z'
    PatientWithEpisodes:
      allOf:
        - $ref: '#/components/schemas/Patient'
        - type: array
          items:
            $ref: '#/components/schemas/Episode'
    Workflow:
      type: object
      properties:
        id:
          type: string
          format: integer
        steps:
          type: array
          items:
            $ref: '#/components/schemas/Step'
      required:
        - id
    Episode:
      properties:
        id:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
        requirementId:
          type: string
          format: uuid
        report:
          type: string
        decision:
          type: string
        stepInfo:
          type: array
          items:
            $ref: '#/components/schemas/StepInfo'
        createdAt:
          type: string
          format: date-time
          example: '2017-07-21T17:32:28Z'
        updatedAt:
          type: string
          format: date-time
          example: '2017-07-21T17:32:28Z'
        workflowId:
          type: string
          format: integer
      required:
        - patientId
        - workflowId
    Step:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        skippable:
          type: boolean
        steps:
          type: array
          items:
            $ref: '#/components/schemas/Step'
      required:
        - id
        - name
    StepInfo:
      type: object
      properties:
        stepStatus:
          $ref: '#/components/schemas/StepStatus'
        stepId:
          type: integer
        episodeId:
          type: string
          format: uuid
    StepStatus:
      type: string
      enum: [ PENDING, INCOMPLETE, COMPLETE ]
    Diagnose:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        recordedOn:
          type: string
          format: date
          example: '2020-05-27'
        icd10:
          $ref: '#/components/schemas/Code'
        icdO3T:
          $ref: '#/components/schemas/Code'
        whoGrade:
          $ref: '#/components/schemas/Code'
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/StatusHistory'
        guidelineTreatmentStatus:
          type: string
          enum: [ "exhausted", "non-exhausted", "impossible",  "no-guidelines-available", "unknown" ]
        histologyResults:
          type: array
          items:
            type: string
            format: uuid
        isGermlineDiagnosisExist:
          type: boolean
        germlineDiagnosisIcd10:
          $ref: '#/components/schemas/Code'
        hpoIcd10:
          type: array
          items:
            $ref: '#/components/schemas/Code'
        orphanetCode:
          $ref: '#/components/schemas/Code'
        alphaIdSeCode:
          $ref: '#/components/schemas/Code'
        tnmKey:
          $ref: '#/components/schemas/Code'
        altTumorKey:
          type: array
          items:
            $ref: '#/components/schemas/Code'
    Code:
      type: object
      properties:
        code:
          type: string
        display:
          type: string
        version:
          type: string
        system:
          type: string
          # enum: [ICD10, ICDO3T, WHO_GRADE]
    ValueSet:
      type: object
      properties:
        code:
          type: string
        system:
          type: string
    StatusHistory:
      type: object
      properties:
        status:
          type: string
          enum: [ "tumor-free", "local", "metastasized", "unknown" ]
        date:
          type: string
          format: date
    Specimen:
      type: object
      properties:
        id:
          type: string
          format: uuid
        labelling:
          type: string
        episodeId:
          type: string
          format: uuid
        icd10:
          $ref: '#/components/schemas/Code'
        type:
          type: string
          enum: [ "fresh-tissue", "cryo-frozen", "liquid-biopsy", "FFPE", "unknown" ]
        collection:
          $ref: '#/components/schemas/SpecimenCollection'
    SpecimenCollection:
      type: object
      properties:
        localization:
          type: string
          enum: [ "primary-tumor", "metastasis" , "unknown", "local-recurrence", "regional-lymph-node", "cellfree-dna" ]
        date:
          type: string
          format: date
        method:
          type: string
          enum: [ "biopsy", "resection", "liquid-biopsy", "cytology", "unknown" ]
    HistologyReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        specimen:
          type: string
          format: uuid
        issuedOn:
          type: string
          format: date
        tumorMorphology:
          $ref: '#/components/schemas/TumorMorphology'
        tumorCellContent:
          $ref: '#/components/schemas/TumorCellContent'
        differentiationDegree:
          $ref: '#/components/schemas/DifferentiationDegree'
    IhcReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        specimenId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        journalId:
          type: string
        blockId:
          type: string
        proteinExpressionResults:
          type: array
          items:
            $ref: '#/components/schemas/ProteinExpression'
        msimmrResults:
          type: array
          items:
            $ref: '#/components/schemas/ProteinExpression'
    ProteinExpression:
      type: object
      properties:
        id:
          type: string
          format: uuid
        protein:
          $ref: "#/components/schemas/Code"
        value:
          $ref: "#/components/schemas/Code"
        tpsScore:
          type: integer
          minimum: 0
          maximum: 100
        cpsScore:
          type: integer
        icScore:
          $ref: "#/components/schemas/Code"
        tcScore:
          $ref: "#/components/schemas/Code"
    TumorMorphology:
      type: object
      properties:
        id:
          type: string
          format: uuid
        specimen:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        value:
          $ref: '#/components/schemas/Code'
        note:
          type: string
    TumorCellContent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        specimen:
          type: string
          format: uuid
        method:
          type: string
          enum: [ "histologic", "bioinformatic" ]
        value:
          type: number
          format: float
    DifferentiationDegree:
      type: string
      enum: ["0", "1", "2", "3", "4", "5", "X", "L", "M", "H", "B", "U", "T"]
      description: |
        Degree of differentiation of the tumour. The possible values and their meanings are:
        - 0: primär erworbene Melanose ohne zelluläre Atypien (nur beim malignen Melanom der Konjunktiva)
        - 1: gut differenziert
        - 2: mäßig differenziert
        - 3: schlecht differenziert
        - 4: undifferenziert
        - 5: nur für C61, TNM8
        - X: nicht bestimmbar
        - L: low grade (G1 oder G2)
        - M: intermediate grade (G2 oder G3)
        - H: high grade (G3 oder G4)
        - B: Borderline
        - U: unbekannt
        - T: trifft nicht zu
    InterpretationFindingsObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        specimen:
          type: string
          format: uuid
        value:
          type: number
          format: float
        interpretation:
          $ref: '#/components/schemas/Code'
    MicroSatelliteInstabilities:
      type: object
      properties:
        id:
          type: string
          format: uuid
        specimen:
          type: string
          format: uuid
        value:
          type: number
          format: float
        method:
          $ref: '#/components/schemas/Code'
        interpretation:
          $ref: '#/components/schemas/Code'
    BRCAness:
      type: object
      properties:
        id:
          type: string
          format: uuid
        specimen:
          type: string
          format: uuid
        value:
          type: number
          format: float
        confidenceRange:
          $ref: '#/components/schemas/ConfidenceRange'
    ConfidenceRange:
      type: object
      properties:
        min:
          type: number
          format: float
        max:
          type: number
          format: float
    GuidelineTherapy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        diagnosis:
          type: string
          format: uuid
        therapyLine:
          type: string
          format: integer
        medication:
          type: array
          items:
            $ref: '#/components/schemas/Code'
        period:
          $ref: '#/components/schemas/Period'
        reasonStopped:
          $ref: '#/components/schemas/ValueSet'
        procedure:
          $ref: '#/components/schemas/Code'
        procedurePosition:
          type: string
          enum: ["O", "A", "N", "I", "S"]
          description: >
             * `O` - ohne Bezug zur operativen Therapie
             * `A` - adjuvant
             * `N` - neoadjuvant
             * `I` - intraoperativ
             * `S` - sonstiges
        intention:
          type: string
          enum: ["K", "P", "S", "X"]
        progressDate:
          type: string
          format: date
        molecularTherapyResponse:
          type: string
          format: uuid
      required:
        - episodeId
        - diagnosis
        - period
    Period:
      type: object
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
    MolecularPathologyFinding:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        performingInstitute:
          type: string
          format: uuid
        specimen:
          type: string
          format: uuid
        issuedOn:
          type: string
          format: date
        note:
          type: string
        typeOfDiagnostic:
          type: array
          items:
            $ref: "#/components/schemas/Code"
    FamilyMemberDiagnosis:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        relationship:
          $ref: '#/components/schemas/ValueSet'
        details:
          type: string
    EcogStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        effectiveDate:
          type: string
          format: date
        value:
          $ref: '#/components/schemas/ValueSet'
    RebiopsyRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        specimen:
          type: string
          format: uuid
        issuedOn:
          type: string
          format: date
    HistologyReevaluationRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        specimen:
          type: string
          format: uuid
        issuedOn:
          type: string
          format: date
    GeneticCounsellingRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        episodeId:
          type: string
          format: uuid
        issuedOn:
          type: string
          format: date
        reason:
          $ref: '#/components/schemas/Code'
    StudyInclusionRequest:
      type: object
      properties:
